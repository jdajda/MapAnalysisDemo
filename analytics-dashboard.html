<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --header-h: 48px;
  --sidebar-w: 280px;
  --panel-w: 340px;
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2a2e3a;
  --text: #e1e4eb;
  --text2: #8b90a0;
  --accent: #4f8cff;
  --accent2: #6c5ce7;
  --green: #00b894;
}
body.light {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #e8eaef;
  --border: #d1d5db;
  --text: #1a1d27;
  --text2: #6b7280;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}
.app { display: flex; height: 100vh; flex-direction: column; }

/* Header */
.header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
}
.header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
.header-badge {
  font-size: 10px;
  background: var(--accent2);
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 500;
  opacity: 0.8;
}
.header-right { margin-left: auto; display: flex; gap: 12px; align-items: center; }
.header-right span { font-size: 12px; color: var(--text2); }
.theme-toggle {
  display: flex;
  align-items: center;
  cursor: pointer;
  gap: 4px;
  user-select: none;
}
.theme-toggle input { display: none; }
.theme-slider {
  font-size: 18px;
  line-height: 1;
  transition: transform 0.2s, filter 0.2s;
  filter: grayscale(0.3);
}
.theme-toggle input:checked + .theme-slider {
  filter: none;
  transform: rotate(180deg);
}

/* Body */
.body { display: flex; flex: 1; overflow: hidden; }

/* Left Sidebar */
.sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 16px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sidebar-header button {
  background: var(--accent);
  border: none;
  color: #fff;
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 500;
}
.file-list { flex: 1; overflow-y: auto; padding: 8px; }
.file-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 4px;
}
.file-item:hover { background: var(--surface2); }
.file-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }
.file-icon {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.file-icon.xlsx { background: #1d6f42; color: #55efc4; }
.file-icon.csv { background: #2d3436; color: #dfe6e9; }
.file-info { flex: 1; min-width: 0; }
.file-name { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
.file-name > span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.file-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.file-check { color: var(--green); font-size: 12px; }
.file-remove {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 16px;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
  opacity: 0;
  transition: opacity 0.15s;
}
.file-item:hover .file-remove { opacity: 1; }
.file-remove:hover { color: #e74c3c; }
.file-rename {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
  opacity: 0;
  transition: opacity 0.15s;
}
.file-item:hover .file-rename { opacity: 1; }
.file-rename:hover { color: var(--accent); }
.file-vis-toggle, .file-icon-btn {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 14px;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
  flex-shrink: 0;
}
.file-vis-toggle:hover { color: var(--accent); }
.file-vis-toggle.hidden { opacity: 0.35; position: relative; }
.file-vis-toggle.hidden::after {
  content: '';
  position: absolute;
  left: 1px; right: 1px; top: 50%;
  height: 2px;
  background: #e74c3c;
  transform: rotate(-18deg);
  border-radius: 1px;
}
.file-label-btn {
  background: none;
  border: 1px solid transparent;
  color: var(--text2);
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  padding: 1px 3px;
  line-height: 1;
  border-radius: 3px;
  flex-shrink: 0;
  letter-spacing: 0.5px;
  opacity: 0;
  transition: opacity 0.15s;
}
.file-item:hover .file-label-btn { opacity: 1; }
.file-label-btn.active {
  opacity: 1;
  color: var(--accent);
  border-color: var(--accent);
}
.file-icon-btn:hover { color: #fdcb6e; }
.file-icon-btn { font-size: 12px; }

/* Sidebar tabs */
.sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.sidebar-tab {
  flex: 1;
  background: none;
  border: none;
  color: var(--text2);
  font-size: 11px;
  font-weight: 500;
  padding: 10px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  transition: color 0.15s, background 0.15s;
  border-bottom: 2px solid transparent;
}
.sidebar-tab:hover { color: var(--text); background: var(--surface2); }
.sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Built-in set items */
.poi-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 4px;
}
.poi-item:hover { background: var(--surface2); }
.poi-item.disabled { opacity: 0.5; cursor: default; }
.poi-icon {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  background: #2d3436;
  color: #dfe6e9;
}
.poi-info { flex: 1; min-width: 0; }
.poi-name { font-size: 13px; font-weight: 500; }
.poi-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.poi-status { font-size: 11px; color: var(--accent); }

/* Center */
.center { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Tabs */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  flex-shrink: 0;
}
.tab {
  padding: 12px 20px;
  font-size: 13px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  color: var(--text2);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-count {
  font-size: 10px;
  background: var(--surface2);
  padding: 1px 7px;
  border-radius: 8px;
  color: var(--text2);
}
.tab.active .tab-count { background: rgba(79,140,255,0.15); color: var(--accent); }

/* Content */
.content { flex: 1; display: flex; overflow: hidden; position: relative; }
.content-pane { flex: 1; display: none; overflow: auto; }
.content-pane.active { display: flex; }

/* Table view */
.table-view { flex-direction: column; padding: 16px; }
.table-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  flex-shrink: 0;
  gap: 12px;
}
.table-controls h3 { font-size: 14px; font-weight: 500; flex-shrink: 0; }
.table-controls span { font-size: 12px; color: var(--text2); flex-shrink: 0; }
.filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  max-width: 380px;
  margin: 0 auto;
}
.filter-bar input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 12px 7px 32px;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.filter-bar input:focus { border-color: var(--accent); }
.filter-bar input::placeholder { color: var(--text2); }
.filter-bar .search-icon {
  position: absolute;
  margin-left: 10px;
  color: var(--text2);
  font-size: 13px;
  pointer-events: none;
}
.filter-bar .clear-btn {
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  display: none;
}
.filter-bar .clear-btn.visible { display: block; }
.filter-bar .clear-btn:hover { color: var(--text); }
.filter-wrap { position: relative; display: flex; align-items: center; flex: 1; }
.table-wrapper { flex: 1; overflow: auto; border: 1px solid var(--border); border-radius: 8px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { position: sticky; top: 0; z-index: 2; }
th {
  background: var(--surface2);
  padding: 8px 14px;
  text-align: left;
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  vertical-align: top;
}
th .th-label {
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 4px;
}
th .th-label:hover { color: var(--text); }
th .th-label .sort-arrow { font-size: 10px; opacity: 0.4; }
th .th-label .sort-arrow.active { opacity: 1; color: var(--accent); }
th .th-filter {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 11px;
  color: var(--text);
  outline: none;
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
  box-sizing: border-box;
  min-width: 60px;
}
th .th-filter::placeholder { color: var(--text2); font-size: 10px; }
th .th-filter:focus { border-color: var(--accent); }
td {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tr:hover td { background: rgba(79,140,255,0.04); }
tr.selected td { background: rgba(79,140,255,0.08); }
.type-lat { color: var(--green); }
.type-lng { color: var(--orange); }
.type-name { font-weight: 500; }

/* Map view */
.map-view { flex-direction: column; }
.map-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.map-toolbar label { font-size: 12px; color: var(--text2); }
.toggle-group {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.toggle-group button {
  background: var(--surface);
  border: none;
  color: var(--text2);
  font-size: 12px;
  padding: 5px 14px;
  cursor: pointer;
  transition: all 0.15s;
  border-right: 1px solid var(--border);
}
.toggle-group button:last-child { border-right: none; }
.toggle-group button:hover { color: var(--text); background: var(--surface2); }
.toggle-group button.active { background: var(--accent); color: #fff; }
#map { flex: 1; }

/* Details panel */
.details-panel {
  position: absolute;
  top: 0;
  right: calc(-1 * var(--panel-w));
  width: var(--panel-w);
  height: 100%;
  background: var(--surface);
  border-left: 1px solid var(--border);
  transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  box-shadow: -8px 0 24px rgba(0,0,0,0.3);
}
.details-panel.open { right: 0; }
.panel-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.panel-header h3 { font-size: 15px; font-weight: 600; }
.panel-close {
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  font-size: 20px;
  padding: 4px;
  line-height: 1;
}
.panel-close:hover { color: var(--text); }
.panel-body { flex: 1; overflow-y: auto; padding: 20px; }
.detail-toolbar { margin-bottom: 12px; display: flex; gap: 6px; }
.detail-toolbar .tool-btn { font-size: 11px; padding: 4px 10px; }
.detail-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.detail-row .label { color: var(--text2); }
.detail-row .value { font-weight: 500; text-align: right; }
.leaflet-tooltip {
  background: var(--surface) !important;
  color: var(--text) !important;
  border: 1px solid var(--border) !important;
  border-radius: 6px !important;
  padding: 4px 10px !important;
  font-size: 12px !important;
  font-weight: 500 !important;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2) !important;
}
.leaflet-tooltip-top::before { border-top-color: var(--border) !important; }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text2);
  gap: 8px;
}
.empty-state .icon { font-size: 48px; opacity: 0.3; }
.empty-state p { font-size: 14px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }

/* Leaflet fix */
.leaflet-popup-content-wrapper { background: var(--surface) !important; color: var(--text) !important; border-radius: 8px !important; }
.leaflet-popup-tip { background: var(--surface) !important; }
.leaflet-popup-content { margin: 10px 14px; font-size: 13px; }

/* Measure tool */
.marker-icon { background: transparent !important; border: none !important; }
.marker-emoji {
  font-size: 24px;
  line-height: 1;
  text-align: center;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
  cursor: pointer;
}
.toolbar-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  flex-shrink: 0;
}
.tool-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 12px;
  padding: 5px 14px;
  cursor: pointer;
  transition: all 0.15s;
  border-radius: 6px;
  flex-shrink: 0;
}
.tool-btn:hover { color: var(--text); background: var(--surface2); }
.tool-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.dist-total {
  margin-left: auto;
  font-size: 12px;
  color: #fdcb6e;
  font-weight: 500;
  white-space: nowrap;
  min-width: 100px;
  text-align: right;
}
.measure-label {
  background: rgba(26, 29, 39, 0.88);
  color: #fdcb6e;
  border: 1px solid #fdcb6e;
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
  text-align: center;
  line-height: 1.5;
}
.measure-point-icon {
  width: 14px;
  height: 14px;
  background: #fdcb6e;
  border: 2px solid #fff;
  border-radius: 50%;
  cursor: grab;
}
.measure-point-icon:hover {
  width: 18px;
  height: 18px;
  margin: -2px 0 0 -2px;
}
.measure-point-icon-dragging {
  cursor: grabbing;
  width: 18px;
  height: 18px;
  margin: -2px 0 0 -2px;
  background: #e17055;
}

/* Import dialog */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 680px;
  max-width: 92vw;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.modal-header h3 { font-size: 15px; font-weight: 600; }
.modal-close {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 22px;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
}
.modal-close:hover { color: var(--text); }
.modal-body {
  padding: 20px;
  overflow-y: auto;
  flex: 1;
}
.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.icon-picker-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  padding: 4px;
}
.icon-option {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  background: var(--bg);
  border: 1px solid var(--border);
  transition: all 0.15s;
}
.icon-option:hover { background: var(--surface2); border-color: var(--accent); transform: scale(1.1); }
.import-config {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.import-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.import-field.full { grid-column: 1 / -1; }
.import-field label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text2);
  font-weight: 500;
}
.import-field select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 13px;
  color: var(--text);
  outline: none;
  cursor: pointer;
}
.import-field select:focus { border-color: var(--accent); }
.import-btn {
  background: var(--accent) !important;
  color: #fff !important;
  border-color: var(--accent) !important;
}
.import-preview label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text2);
  font-weight: 500;
  margin-bottom: 8px;
  display: block;
}
.import-preview label span {
  color: var(--text2);
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
  margin-left: 8px;
}
.import-table-wrap {
  max-height: 220px;
  overflow: auto;
  border: 1px solid var(--border);
  border-radius: 8px;
}
.import-table-wrap table { font-size: 12px; }
.import-table-wrap th {
  padding: 6px 10px;
  font-size: 10px;
  position: sticky;
  top: 0;
  z-index: 1;
}
.import-table-wrap td {
  padding: 5px 10px;
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.merge-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.merge-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  background: var(--surface2);
  transition: background 0.15s;
  font-size: 13px;
}
.merge-item:hover { background: var(--border); }
.merge-item input[type="checkbox"] {
  accent-color: var(--accent);
  width: 16px;
  height: 16px;
  cursor: pointer;
}
.merge-item span { color: var(--text); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>&#9670; Analytics</h1>
    <span class="header-badge">MOCKUP</span>
    <div class="header-right">
      <label class="theme-toggle" title="Toggle theme">
        <input type="checkbox" id="themeSwitch" onchange="toggleTheme()">
        <span class="theme-slider">&#127769;</span>

        <div class="poi-name">${s.name}</div>

}

function loadBuiltinSet(id) {
  const set = BUILTIN_SETS.find(s => s.id === id);

  set.status = 'loading';

  const genMap = { poi_embassies: generateEmbassiesData, poi_banks: generateBanksData, poi_government: generateGovernmentData, poi_pl_embassies: generatePolandEmbassiesData };
  const data = genMap[set.id] ? genMap[set.id]() : [];
  const fileId = 'f' + fileIdCounter++;
  FILES.forEach(f => f.active = false);
  const nameMap = { poi_embassies: 'Embassies in Europe', poi_banks: 'Banks in Europe', poi_government: 'Government Locations', poi_pl_embassies: 'Embassies in Poland' };
  const iconMap = { poi_embassies: '\u{1F3DB}', poi_banks: '\u{1F3E6}', poi_government: '\u{1F3DB}', poi_pl_embassies: '\u{1F1F5}\u{1F1F1}' };
  FILES.push({
    id: fileId, name: nameMap[set.id] || set.name, type: 'csv', size: `${data.length} points`, rows: data.length, cols: 5,
    active: true, visible: true, icon: iconMap[set.id] || null, showLabels: false,
    latKey: 'latitude', lngKey: 'longitude', coordFormat: 'DD', data
  });
  currentFileId = fileId;
  sortKey = null; sortDir = 'asc';

let datasetMarkers = {};

function selectFile(id) {
  FILES.forEach(f => f.active = f.id === id);
  currentFileId = id;
  sortKey = null;
  sortDir = 'asc';
  renderSidebar();
  renderTable();
  renderMap(id);
  updateCounts();
  blinkDataset(id);
}

function blinkDataset(id) {
  const markers = datasetMarkers[id] || [];
  if (markers.length === 0) return;
  markers.forEach(m => {
    if (m._path) {
      m._path.style.transition = 'fill 1s ease, fill-opacity 1s ease';
      m.setStyle({ fillColor: '#e74c3c', fillOpacity: 0.9 });
    } else if (m._icon) {
      m._icon.style.transition = 'filter 1s ease, opacity 1s ease';
      m._icon.style.filter = 'sepia(1) saturate(8) hue-rotate(-20deg)';
    }
  });
  setTimeout(() => {
    markers.forEach(m => {
      if (m._path) {
        m.setStyle({ fillColor: m._originalColor || '#6c5ce7', fillOpacity: 0.7 });
        setTimeout(() => { if (m._path) m._path.style.transition = ''; }, 1000);
      } else if (m._icon) {
        m._icon.style.filter = '';
        setTimeout(() => { if (m._icon) m._icon.style.transition = ''; }, 1000);
      }
    });
  }, 1000);
}

function toggleVisibility(id) {
  const file = FILES.find(f => f.id === id);
  if (!file) return;
  file.visible = !file.visible;
  renderSidebar();
  renderMap();
}

function toggleDatasetLabels(id) {
  const file = FILES.find(f => f.id === id);
  if (!file) return;
  file.showLabels = !file.showLabels;
  // Clear per-point overrides when dataset-level toggles
  if (file.showLabels) {
    file.data.forEach(r => delete r._showLabel);
  }
  renderSidebar();
  renderMap();
}

function getLabelText(row) {
  const nameKey = Object.keys(row).find(k => /^(name|city|store|respondent|title)$/i.test(k));
  if (nameKey && row[nameKey]) return String(row[nameKey]);
  if (row.id != null) return '#' + row.id;
  const firstVal = Object.values(row).find(v => v != null && v !== '');
  return firstVal != null ? String(firstVal) : '';
}

const ICON_PICKER_OPTIONS = ['📍', '🔴', '🔵', '🟢', '🟡', '🟠', '🟣', '\u{1F3DB}', '\u{1F3E6}', '\u{1F3E3}', '🏨', '🏪', '🏠', '⛽', '🎯', '⭐', '💎', '📌', '⚕', '🏥'];
let iconPickerTargetId = null;

function showIconPicker(id) {

function getCurrentFile() {
  return FILES.find(f => f.id === currentFileId);
}

function getLatLngColumns(file) {
  const keys = Object.keys(file.data[0] || {});
  let latKey = file.latKey;
  let lngKey = file.lngKey;
  if (!latKey || !keys.includes(latKey)) latKey = keys.find(k => /lat/i.test(k));
  if (!lngKey || !keys.includes(lngKey)) lngKey = keys.find(k => /lng|lon/i.test(k));
  return { latKey, lngKey };
}

function sortData(arr) {
  if (!sortKey) return arr;
  return [...arr].sort((a, b) => {
    const va = a[sortKey];
    const vb = b[sortKey];
    const na = parseFloat(va);
    const nb = parseFloat(vb);
    const cmp = !isNaN(na) && !isNaN(nb) ? na - nb : String(va).localeCompare(String(vb), undefined, { numeric: true });
    return sortDir === 'asc' ? cmp : -cmp;
  });
}

function sortBy(key) {
  if (sortKey === key) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortKey = key;
    sortDir = 'asc';
  }
  renderTable();
  renderMap();
}

function getFilteredData() {
  const file = getCurrentFile();
  if (!file) return [];
  const globalQ = (document.getElementById('globalFilter').value || '').toLowerCase().trim();

  const keys = Object.keys(file.data[0] || {});
  const colFilters = {};
  keys.forEach(k => {
    const el = document.getElementById(`cf_${k}`);
    if (el) {
      const v = el.value.toLowerCase().trim();
      if (v) colFilters[k] = v;
    }
  });

  return file.data.filter((row, idx) => {
    if (globalQ) {
      const match = keys.some(k => String(row[k]).toLowerCase().includes(globalQ));
      if (!match) return false;
    }
    for (const [k, q] of Object.entries(colFilters)) {
      if (!String(row[k]).toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function renderTableHead() {
  const file = getCurrentFile();
  if (!file) return;
  const keys = Object.keys(file.data[0] || {});
  const thead = document.getElementById('tableHead');
  thead.innerHTML = keys.map(k => {
    const safe = k.replace(/'/g, "\\'");
    const arrow = sortKey === k
      ? (sortDir === 'asc' ? '<span class="sort-arrow active">&#9650;</span>' : '<span class="sort-arrow active">&#9660;</span>')
      : '<span class="sort-arrow">&#9650;&#9660;</span>';
    return `<th><div class="th-label" onclick="sortBy('${safe}')">${k} ${arrow}</div><input class="th-filter" id="cf_${k}" placeholder="filter" oninput="onFilterChange()"></th>`;
  }).join('');
}

function renderTableBody() {
  const file = getCurrentFile();
  if (!file) return;
  const data = file.data;
  const keys = Object.keys(data[0] || {});
  const { latKey, lngKey } = getLatLngColumns(file);
  let filtered = getFilteredData();
  const globalQ = document.getElementById('globalFilter');

  // Sort
  if (sortKey) {
    filtered = sortData(filtered);
  }

  document.getElementById('currentFileLabel').textContent = file.name;
  document.getElementById('rowInfo').textContent = `${filtered.length} / ${data.length} rows`;
  document.getElementById('clearFilter').classList.toggle('visible', globalQ.value.length > 0);

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = filtered.map((row, idx) => {
    const cls = idx === 0 ? 'class="selected"' : '';
    return `<tr ${cls} onclick="selectTableRow(${idx})">${keys.map(k => {
      let extra = '';
      if (k === latKey) extra = ' class="type-lat"';
      else if (k === lngKey) extra = ' class="type-lng"';
      else if (k === 'city' || k === 'store' || k === 'name') extra = ' class="type-name"';
      return `<td${extra}>${row[k]}</td>`;
    }).join('')}</tr>`;
  }).join('');
}

function renderTable() {
  renderTableHead();
  renderTableBody();
}

function onFilterChange() {
  renderTableBody();
  renderMap();
}

function clearGlobalFilter() {
  document.getElementById('globalFilter').value = '';

}

function selectTableRow(idx) {
  const file = getCurrentFile();
  if (!file) return;
  const filtered = sortData(getFilteredData());
  const row = filtered[idx];
  if (!row) return;
  document.querySelectorAll('#tableBody tr').forEach((tr, i) => tr.classList.toggle('selected', i === idx));
  openDetails(row);
  if (mapInstance) {
    const { latKey, lngKey } = getLatLngColumns(file);
    if (latKey && lngKey) {
      let lat = row[latKey], lng = row[lngKey];
      if (file.coordFormat && file.coordFormat !== 'DD') {
        lat = parseCoord(lat, file.coordFormat);
        lng = parseCoord(lng, file.coordFormat);
      }
      mapInstance.setView([lat, lng], 10);
      mapInstance.eachLayer(l => {
        if (l.getLatLng && Number(l.getLatLng().lat).toFixed(4) === Number(lat).toFixed(4) && Number(l.getLatLng().lng).toFixed(4) === Number(lng).toFixed(4)) {
          l.openPopup();
        }
      });
    }
  }
}

function setMapMode(mode) {

const DATASET_COLORS = ['#6c5ce7', '#00b894', '#fdcb6e', '#e17055', '#74b9ff', '#fd79a8', '#a29bfe', '#55efc4', '#ffeaa7', '#fab1a0'];

function getTileUrl() {
  return document.body.classList.contains('light')
    ? 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
}

let tileLayer = null;

function renderMap(focusFileId) {
  const activeFile = getCurrentFile();
  const visibleFiles = FILES.filter(f => f.visible);

  if (!mapInstance) {
    mapInstance = L.map('map', { zoomControl: false }).setView([39.8283, -98.5795], 4);
    tileLayer = L.tileLayer(getTileUrl(), {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
    }).addTo(mapInstance);
    L.control.zoom({ position: 'bottomright' }).addTo(mapInstance);
  } else if (tileLayer) {
    tileLayer.setUrl(getTileUrl());
  }

  mapInstance.eachLayer(l => {
    if (l instanceof L.LayerGroup || l instanceof L.Polyline) {
      mapInstance.removeLayer(l);
    }
  });

  let allCoords = [];
  let focusCoords = [];
  let datasetIndex = 0;

  visibleFiles.forEach(file => {
    const color = DATASET_COLORS[datasetIndex % DATASET_COLORS.length];
    const isActive = file.id === (activeFile && activeFile.id);
    const isFocus = focusFileId && file.id === focusFileId;
    const { latKey, lngKey } = getLatLngColumns(file);
    const needParse = file.coordFormat && file.coordFormat !== 'DD';
    const data = isActive ? sortData(getFilteredData()) : file.data;

    const raw = data.map(r => {
      let lat = r[latKey], lng = r[lngKey];
      if (lat == null || lng == null) return null;
      if (needParse) { lat = parseCoord(lat, file.coordFormat); lng = parseCoord(lng, file.coordFormat); }
      lat = Number(lat); lng = Number(lng);
      return (!isNaN(lat) && !isNaN(lng)) ? { lat, lng, row: r } : null;
    }).filter(Boolean);

    if (raw.length === 0) return;
    const coords = raw.map(p => [p.lat, p.lng]);
    allCoords = allCoords.concat(coords);
    if (isFocus) focusCoords = focusCoords.concat(coords);

    const displayKeys = Object.keys(data[0] || {}).filter(k => k !== latKey && k !== lngKey);

    // Track mode only for active file
    if (isActive && (mapMode === 'track' || mapMode === 'both')) {
      const track = L.polyline(coords, {
        color: color, weight: 3, opacity: 0.8, smoothFactor: 1
      }).addTo(mapInstance);
      if (coords.length > 0) {
        L.circleMarker(coords[0], { radius: 8, fillColor: '#00b894', color: '#fff', weight: 2, fillOpacity: 1 })
          .addTo(mapInstance).bindPopup('<b>Start</b>');
      }
      if (coords.length > 1) {
        L.circleMarker(coords[coords.length - 1], { radius: 8, fillColor: '#e17055', color: '#fff', weight: 2, fillOpacity: 1 })
          .addTo(mapInstance).bindPopup('<b>End</b>');
      }
    }

    // Points mode (or both for non-active, points for all)
    if (mapMode === 'points' || mapMode === 'both' || !isActive) {
      const pointLayer = L.layerGroup().addTo(mapInstance);
      datasetMarkers[file.id] = [];

      raw.forEach((pt, idx) => {
        const showLabel = file.showLabels || pt.row._showLabel;
        if (file.icon) {
          const marker = L.marker([pt.lat, pt.lng], {
            icon: L.divIcon({
              className: 'marker-icon',
              html: `<div class="marker-emoji">${file.icon}</div>`,
              iconSize: [32, 32],
              iconAnchor: [16, 16]
            })
          }).addTo(pointLayer);
          const popupLines = displayKeys.map(k => `<b>${k}:</b> ${pt.row[k]}`).join('<br>');
          marker.bindPopup(`<div style="min-width:160px">${popupLines}</div>`);
          if (showLabel) { const lt = getLabelText(pt.row); if (lt) marker.bindTooltip(lt, { permanent: true, direction: 'top', offset: [0, -18] }); }
          marker.on('click', () => { openDetails(pt.row); });
          datasetMarkers[file.id].push(marker);
        } else {
          const marker = L.circleMarker([pt.lat, pt.lng], {
            radius: 7, fillColor: color, color: '#fff', weight: 1.5, opacity: 0.9, fillOpacity: 0.7
          }).addTo(pointLayer);
          marker._originalColor = color;
          const popupLines = displayKeys.map(k => `<b>${k}:</b> ${pt.row[k]}`).join('<br>');
          marker.bindPopup(`<div style="min-width:160px">${popupLines}</div>`);
          if (showLabel) { const lt = getLabelText(pt.row); if (lt) marker.bindTooltip(lt, { permanent: true, direction: 'top', offset: [0, -14] }); }
          marker.on('click', () => { openDetails(pt.row); });
          datasetMarkers[file.id].push(marker);
        }
      });
    }

    datasetIndex++;
  });

  const bounds = focusCoords.length > 0 ? focusCoords : allCoords;
  if (bounds.length > 0) {
    mapInstance.fitBounds(L.latLngBounds(bounds), { padding: [30, 30] });
  }

  renderMeasurements();
}

function formatDist(m) {
  if (m >= 1000) return (m / 1000).toFixed(2) + ' km';
  return m.toFixed(1) + ' m';
}

function toggleMeasure() {
  measuring = !measuring;
  document.getElementById('measureBtn').classList.toggle('active', measuring);
  if (mapInstance) {
    if (measuring) {
      mapInstance.on('click', addMeasurePoint);
      mapInstance.getContainer().style.cursor = 'crosshair';
    } else {
      mapInstance.off('click', addMeasurePoint);
      mapInstance.getContainer().style.cursor = '';
    }
  }
}

function addMeasurePoint(e) {
  measurePoints.push({ lat: e.latlng.lat, lng: e.latlng.lng });
  document.getElementById('clearMeasureBtn').style.display = '';
  renderMeasurements();
}

function clearMeasurements() {
  measurePoints = [];
  if (mapInstance) {
    mapInstance.eachLayer(l => {
      if (l._isMeasure) mapInstance.removeLayer(l);
    });
  }
  document.getElementById('clearMeasureBtn').style.display = 'none';
  document.getElementById('totalDistDisplay').style.display = 'none';
}

function renderMeasurements() {
  if (!mapInstance) return;
  mapInstance.eachLayer(l => {
    if (l._isMeasure) mapInstance.removeLayer(l);
  });
  if (measurePoints.length === 0) return;

  measurePoints.forEach((pt, i) => {
    const m = L.marker([pt.lat, pt.lng], {
      draggable: true,
      icon: L.divIcon({
        className: 'measure-point-icon',
        iconSize: [14, 14],
        iconAnchor: [7, 7]
      })
    });
    m._isMeasure = true;
    m._pointIndex = i;
    m.addTo(mapInstance);
    m.bindPopup('<b>Point ' + (i + 1) + '</b><br>' + pt.lat.toFixed(6) + ', ' + pt.lng.toFixed(6));
    m.on('dragstart', function(e) {
      e.target._icon.classList.add('measure-point-icon-dragging');
    });
    m.on('dragend', function(e) {
      e.target._icon.classList.remove('measure-point-icon-dragging');
      const pos = e.target.getLatLng();
      const idx = e.target._pointIndex;
      measurePoints[idx] = { lat: pos.lat, lng: pos.lng };
      renderMeasurements();
    });
  });

  let totalDist = 0;
  for (let i = 0; i < measurePoints.length - 1; i++) {
    const a = measurePoints[i];
    const b = measurePoints[i + 1];
    const segDist = L.latLng(a.lat, a.lng).distanceTo(L.latLng(b.lat, b.lng));
    totalDist += segDist;

    const line = L.polyline([[a.lat, a.lng], [b.lat, b.lng]], {
      color: '#fdcb6e', weight: 2, dashArray: '6, 8', opacity: 0.9
    });
    line._isMeasure = true;
    line.addTo(mapInstance);

    const midLat = (a.lat + b.lat) / 2;
    const midLng = (a.lng + b.lng) / 2;
    const label = L.marker([midLat, midLng], {
      icon: L.divIcon({ className: 'measure-label', html: formatDist(segDist), iconSize: [80, 20], iconAnchor: [40, 10] }),
      interactive: false
    });
    label._isMeasure = true;
    label.addTo(mapInstance);
  }

  document.getElementById('totalDistVal').textContent = formatDist(totalDist);
  document.getElementById('totalDistDisplay').style.display = '';
}

function switchTab(name) {

  document.querySelectorAll('.content-pane').forEach(p => p.classList.toggle('active', p.id === `pane${name.charAt(0).toUpperCase() + name.slice(1)}`));

function handleFileImport(event) {
  const input = event.target;
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const ext = file.name.split('.').pop().toLowerCase();
      const workbook = ext === 'csv'
        ? XLSX.read(new TextDecoder('utf-8').decode(data).replace(/^\uFEFF/, ''), { type: 'string' })
        : XLSX.read(data, { type: 'array' });
      const sheetName = workbook.SheetNames[0];
      const worksheet = workbook.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(worksheet, { defval: '' });

      if (rows.length === 0) {
        alert('The file contains no data.');
        return;
      }

      const type = ext === 'csv' ? 'csv' : 'xlsx';
      const sizeStr = file.size >= 1024 * 1024
        ? (file.size / (1024 * 1024)).toFixed(1) + ' MB'
        : (file.size / 1024).toFixed(0) + ' KB';

      pendingImport = { rows, keys: Object.keys(rows[0]), name: file.name, type, size: sizeStr };
      showImportDialog();
    } catch (err) {
      alert('Failed to parse file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
}

function showImportDialog() {
  if (!pendingImport) return;
  const { keys, rows } = pendingImport;

  const latSelect = document.getElementById('importLatCol');
  const lngSelect = document.getElementById('importLngCol');
  latSelect.innerHTML = keys.map(k => '<option value="' + k.replace(/"/g, '&quot;') + '">' + k + '</option>').join('');
  lngSelect.innerHTML = keys.map(k => '<option value="' + k.replace(/"/g, '&quot;') + '">' + k + '</option>').join('');

  const autoLatKey = keys.find(k => /lat/i.test(k)) || keys[0];
  const autoLngKey = keys.find(k => /lng|lon/i.test(k)) || (keys.length > 1 ? keys[1] : keys[0]);
  latSelect.value = autoLatKey;
  lngSelect.value = autoLngKey;

  function updateImportFormat() {
    const latKey = document.getElementById('importLatCol').value;
    const latValues = rows.map(r => r[latKey]).filter(v => v != null && v !== '');
    document.getElementById('importFormat').value = detectCoordFormat(latValues);
  }

  const latValues = rows.map(r => r[autoLatKey]).filter(v => v != null && v !== '');
  document.getElementById('importFormat').value = detectCoordFormat(latValues);
  latSelect.onchange = updateImportFormat;
  lngSelect.onchange = updateImportFormat;

  renderImportPreview();
  document.getElementById('importDialog').style.display = '';
}

function renderImportPreview() {
  if (!pendingImport) return;
  const { keys, rows } = pendingImport;
  const previewRows = rows.slice(0, 5);

  document.getElementById('importRowCount').textContent = rows.length + ' rows';

  const thead = '<tr>' + keys.map(k => '<th>' + k + '</th>').join('') + '</tr>';
  const tbody = previewRows.map(row =>
    '<tr>' + keys.map(k => '<td>' + (row[k] != null ? row[k] : '') + '</td>').join('') + '</tr>'
  ).join('');

  document.getElementById('importPreviewTable').innerHTML = thead + tbody;
}

function confirmImport() {
  if (!pendingImport) return;
  const { rows, keys, name, type, size } = pendingImport;
  const latKey = document.getElementById('importLatCol').value;
  const lngKey = document.getElementById('importLngCol').value;
  const format = document.getElementById('importFormat').value;

  const cleanRows = rows.map(row => {
    const r = { ...row };
    const lat = parseCoord(r[latKey], format);
    const lng = parseCoord(r[lngKey], format);
    if (!isNaN(lat)) r[latKey] = lat;
    if (!isNaN(lng)) r[lngKey] = lng;
    return r;
  });

  const id = 'f' + fileIdCounter++;
  FILES.forEach(f => f.active = false);
  FILES.push({
    id, name, type, size,
    rows: cleanRows.length, cols: keys.length,
        active: true,
    visible: true,
    icon: null,
    showLabels: false, showLabels: false, data: cleanRows,
    latKey, lngKey, coordFormat: format
  });

  currentFileId = id;
  sortKey = null;
  sortDir = 'asc';
  pendingImport = null;
  document.getElementById('importDialog').style.display = 'none';
  renderSidebar();
  renderTable();
  renderMap();
  updateCounts();
}

function cancelImport() {
  pendingImport = null;
  document.getElementById('importDialog').style.display = 'none';
}

function showMergeDialog() {
  const container = document.getElementById('mergeFileList');
  container.innerHTML = FILES.map(f => `
    <label class="merge-item">
      <input type="checkbox" value="${f.id}" ${f.active ? 'checked' : ''}>
      <span>${f.name} (${f.rows} rows, ${f.cols} cols)</span>
    </label>
  `).join('');
  document.getElementById('mergeDialog').style.display = '';
}

function cancelMerge() {
  document.getElementById('mergeDialog').style.display = 'none';
}

function confirmMerge() {
  const checked = document.querySelectorAll('#mergeFileList input:checked');
  if (checked.length < 2) {
    alert('Select at least 2 datasets to merge.');
    return;
  }

  const selectedIds = Array.from(checked).map(cb => cb.value);
  const selectedFiles = FILES.filter(f => selectedIds.includes(f.id));

  const allKeys = new Set();
  selectedFiles.forEach(f => (f.data || []).forEach(r => Object.keys(r).forEach(k => allKeys.add(k))));
  const keys = Array.from(allKeys);

  const first = selectedFiles[0];
  let latKey = first.latKey;
  let lngKey = first.lngKey;
  if (!latKey || !keys.includes(latKey)) latKey = keys.find(k => /lat/i.test(k)) || '';
  if (!lngKey || !keys.includes(lngKey)) lngKey = keys.find(k => /lng|lon/i.test(k)) || '';

  const mergedData = [];
  selectedFiles.forEach(f => {
    (f.data || []).forEach(r => {
      const row = {};
      keys.forEach(k => { row[k] = r[k] != null ? r[k] : ''; });
      mergedData.push(row);
    });
  });

  const id = 'f' + fileIdCounter++;
  FILES.forEach(f => f.active = false);
  FILES.push({
    id,
    name: `merged_${selectedFiles.length}_datasets.xlsx`,
    type: 'xlsx',
    size: `${mergedData.length} rows`,
    rows: mergedData.length,
    cols: keys.length,
    active: true,
    visible: true,
    icon: null,
    data: mergedData,
    latKey,
    lngKey,
    coordFormat: 'DD'
  });

  currentFileId = id;
  sortKey = null;
  sortDir = 'asc';
  document.getElementById('mergeDialog').style.display = 'none';
  renderSidebar();
  renderTable();
  renderMap();
  updateCounts();
}

let removeTargetId = null;

function showRemoveDialog(id) {
  const file = FILES.find(f => f.id === id);
  if (!file) return;
  removeTargetId = id;
  document.getElementById('removeMessage').textContent = `Are you sure you want to remove "${file.name}"? This action cannot be undone.`;
  document.getElementById('removeDialog').style.display = '';
}

function cancelRemove() {
  removeTargetId = null;
  document.getElementById('removeDialog').style.display = 'none';
}

function confirmRemove() {
  if (!removeTargetId) return;
  const idx = FILES.findIndex(f => f.id === removeTargetId);
  if (idx === -1) return;
  FILES.splice(idx, 1);
  if (currentFileId === removeTargetId) {
    if (FILES.length > 0) {
      const nextIdx = Math.min(idx, FILES.length - 1);
      currentFileId = FILES[nextIdx].id;
      FILES[nextIdx].active = true;
    } else {
      currentFileId = null;
    }
  }
  removeTargetId = null;
  document.getElementById('removeDialog').style.display = 'none';
  renderSidebar();
  renderTable();
  renderMap();
  updateCounts();
}

let renameTargetId = null;

function showRenameDialog(id) {
  const file = FILES.find(f => f.id === id);
  if (!file) return;
  renameTargetId = id;
  document.getElementById('renameInput').value = file.name;
  document.getElementById('renameDialog').style.display = '';
  document.getElementById('renameInput').focus();
  document.getElementById('renameInput').select();
}

function cancelRename() {
  renameTargetId = null;
  document.getElementById('renameDialog').style.display = 'none';
}

function confirmRename() {
  if (!renameTargetId) return;
  const file = FILES.find(f => f.id === renameTargetId);
  if (!file) return;
  const newName = document.getElementById('renameInput').value.trim();
  if (!newName) {
    document.getElementById('renameInput').focus();
    return;
  }
  file.name = newName;
  renameTargetId = null;
  document.getElementById('renameDialog').style.display = 'none';
  renderSidebar();
  renderTable();
}

function detectCoordFormat(values) {
  for (const v of values) {
    if (v == null || v === '') continue;
    const s = String(v).trim();
    if (/°/.test(s)) {
      if (/"/.test(s)) return 'DMS';
      if (/'/.test(s)) return 'DDM';
    }
  }
  return 'DD';
}

function parseCoord(value, format) {
  if (value == null || value === '') return NaN;
  const s = String(value).trim();

  if (format === 'DD') {
    return parseFloat(s);
  }

  if (format === 'DDM') {
    let m = s.match(/^\s*(-?\d+(?:\.\d+)?)\xB0\s*([\d.]+)'(?:\s*([NSEW]))?\s*$/i);
    if (!m) m = s.match(/^\s*([NSEW])\s*(-?\d+(?:\.\d+)?)\xB0\s*([\d.]+)'\s*$/i);
    if (m) {
      const deg = parseFloat(m[1] || m[2]);
      const min = parseFloat(m[2] || m[3]);
      const dir = (m[3] || m[1] || '').toUpperCase();
      let result = Math.abs(deg) + min / 60;
      if (dir === 'S' || dir === 'W' || deg < 0) result = -result;
      return result;
    }
    return parseFloat(s);
  }

  if (format === 'DMS') {
    let m = s.match(/^\s*(-?\d+(?:\.\d+)?)\xB0\s*(\d+)'\s*([\d.]+)"(?:\s*([NSEW]))?\s*$/i);
    if (!m) m = s.match(/^\s*([NSEW])\s*(-?\d+(?:\.\d+)?)\xB0\s*(\d+)'\s*([\d.]+)"\s*$/i);
    if (m) {
      const deg = parseFloat(m[1] || m[2]);
      const min = parseFloat(m[2] || m[3]);
      const sec = parseFloat(m[3] || m[4]);
      const dir = (m[4] || m[1] || '').toUpperCase();
      let result = Math.abs(deg) + min / 60 + sec / 3600;
      if (dir === 'S' || dir === 'W' || deg < 0) result = -result;
      return result;
    }
    return parseFloat(s);
  }

  return parseFloat(s);
}

// Init
renderBuiltinSets();
renderSidebar();
renderTable();
renderMap();
updateCounts();
